<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DY 策略回测与分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .results {
            margin-top: 30px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .metric-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .metric-card .value.positive {
            color: #10b981;
        }

        .metric-card .value.negative {
            color: #ef4444;
        }

        .chart-container {
            margin: 30px 0;
            text-align: center;
        }

        .chart-container img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .comparison-table th,
        .comparison-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .comparison-table th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }

        .comparison-table tr:hover {
            background: #f9f9f9;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .strategy-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .strategy-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .strategy-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .strategy-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .strategy-card .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 5px;
        }

        .badge-low {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-high {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 DY 策略回测与分析</h1>
            <p>专业的量化策略回测、对比和性能分析工具</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('backtest')">策略回测</button>
            <button class="tab" onclick="switchTab('compare')">策略对比</button>
            <button class="tab" onclick="switchTab('signals')">信号追踪</button>
            <button class="tab" onclick="switchTab('strategies')">策略管理</button>
        </div>

        <!-- 策略回测 -->
        <div id="backtest" class="tab-content active">
            <h2>单股票策略回测</h2>
            <form id="backtestForm">
                <div class="form-group">
                    <label>股票代码</label>
                    <input type="text" id="backtest_symbol" placeholder="例如: AAPL" required>
                </div>
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="backtest_start" required>
                </div>
                <div class="form-group">
                    <label>结束日期</label>
                    <input type="date" id="backtest_end" required>
                </div>
                <div class="form-group">
                    <label>策略</label>
                    <select id="backtest_strategy">
                        <option value="buy_signal">激进策略 (买入信号)</option>
                        <option value="stable" selected>稳健策略 (买入+UP1)</option>
                        <option value="strongest">最强策略 (买入+UP3)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">开始回测</button>
            </form>

            <div id="backtestResults" class="results"></div>
        </div>

        <!-- 策略对比 -->
        <div id="compare" class="tab-content">
            <h2>多策略对比分析</h2>
            <form id="compareForm">
                <div class="form-group">
                    <label>股票代码</label>
                    <input type="text" id="compare_symbol" placeholder="例如: AAPL" required>
                </div>
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="compare_start" required>
                </div>
                <div class="form-group">
                    <label>结束日期</label>
                    <input type="date" id="compare_end" required>
                </div>
                <button type="submit" class="btn btn-primary">开始对比</button>
            </form>

            <div id="compareResults" class="results"></div>
        </div>

        <!-- 信号追踪 -->
        <div id="signals" class="tab-content">
            <h2>历史信号追踪</h2>
            <div class="form-group">
                <label>查询天数</label>
                <select id="signal_days">
                    <option value="7">最近 7 天</option>
                    <option value="30" selected>最近 30 天</option>
                    <option value="90">最近 90 天</option>
                </select>
            </div>
            <button onclick="loadSignalStats()" class="btn btn-primary">查询统计</button>

            <div id="signalResults" class="results"></div>
        </div>

        <!-- 策略管理 -->
        <div id="strategies" class="tab-content">
            <h2>策略管理</h2>
            <button onclick="loadStrategies()" class="btn btn-primary">刷新策略列表</button>
            <button onclick="showCreateStrategy()" class="btn btn-secondary">创建新策略</button>

            <div id="createStrategyForm" style="display: none; margin-top: 20px;">
                <h3>创建自定义策略</h3>
                <div class="form-group">
                    <label>策略名称</label>
                    <input type="text" id="strategy_name" placeholder="例如: 我的策略">
                </div>
                <div class="form-group">
                    <label>策略描述</label>
                    <input type="text" id="strategy_desc" placeholder="简要描述策略逻辑">
                </div>
                <div class="form-group">
                    <label>买入信号</label>
                    <input type="checkbox" id="cond_buy"> 买入信号
                </div>
                <div class="form-group">
                    <label>趋势条件</label>
                    <input type="checkbox" id="cond_up1"> UP1 (突破蓝带)
                    <input type="checkbox" id="cond_up2"> UP2 (突破黄带)
                    <input type="checkbox" id="cond_up3"> UP3 (蓝带>黄带)
                </div>
                <button onclick="createStrategy()" class="btn btn-primary">创建策略</button>
                <button onclick="hideCreateStrategy()" class="btn btn-secondary">取消</button>
            </div>

            <div id="strategyList" class="strategy-list"></div>
        </div>
    </div>

    <script>
        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // 设置默认日期
        function setDefaultDates() {
            const end = new Date();
            const start = new Date();
            start.setFullYear(start.getFullYear() - 1);

            document.getElementById('backtest_end').valueAsDate = end;
            document.getElementById('backtest_start').valueAsDate = start;
            document.getElementById('compare_end').valueAsDate = end;
            document.getElementById('compare_start').valueAsDate = start;
        }

        // 策略回测
        document.getElementById('backtestForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const symbol = document.getElementById('backtest_symbol').value;
            const start_date = document.getElementById('backtest_start').value;
            const end_date = document.getElementById('backtest_end').value;
            const strategy = document.getElementById('backtest_strategy').value;

            const resultsDiv = document.getElementById('backtestResults');
            resultsDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>正在回测，请稍候...</p></div>';

            try {
                const response = await fetch('/api/backtest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol, start_date, end_date, strategy })
                });

                const data = await response.json();

                if (data.success) {
                    const result = data.result;
                    resultsDiv.innerHTML = `
                        <h3>回测结果 - ${result.symbol}</h3>
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <h3>总收益率</h3>
                                <div class="value ${result.total_return_pct > 0 ? 'positive' : 'negative'}">
                                    ${result.total_return_pct.toFixed(2)}%
                                </div>
                            </div>
                            <div class="metric-card">
                                <h3>年化收益率</h3>
                                <div class="value ${result.annual_return_pct > 0 ? 'positive' : 'negative'}">
                                    ${result.annual_return_pct.toFixed(2)}%
                                </div>
                            </div>
                            <div class="metric-card">
                                <h3>最大回撤</h3>
                                <div class="value negative">
                                    ${result.max_drawdown_pct.toFixed(2)}%
                                </div>
                            </div>
                            <div class="metric-card">
                                <h3>夏普比率</h3>
                                <div class="value">
                                    ${result.sharpe_ratio.toFixed(2)}
                                </div>
                            </div>
                            <div class="metric-card">
                                <h3>胜率</h3>
                                <div class="value">
                                    ${result.win_rate_pct.toFixed(2)}%
                                </div>
                            </div>
                            <div class="metric-card">
                                <h3>交易次数</h3>
                                <div class="value">
                                    ${result.total_trades}
                                </div>
                            </div>
                        </div>
                        ${result.equity_chart ? `
                            <div class="chart-container">
                                <h3>资金曲线</h3>
                                <img src="/api/reports/${result.equity_chart}" alt="资金曲线">
                            </div>
                        ` : ''}
                        ${result.trade_chart ? `
                            <div class="chart-container">
                                <h3>交易分析</h3>
                                <img src="/api/reports/${result.trade_chart}" alt="交易分析">
                            </div>
                        ` : ''}
                    `;
                } else {
                    resultsDiv.innerHTML = `<div class="error">回测失败: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">请求失败: ${error.message}</div>`;
            }
        });

        // 策略对比
        document.getElementById('compareForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const symbol = document.getElementById('compare_symbol').value;
            const start_date = document.getElementById('compare_start').value;
            const end_date = document.getElementById('compare_end').value;

            const resultsDiv = document.getElementById('compareResults');
            resultsDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>正在对比策略，请稍候...</p></div>';

            try {
                const response = await fetch('/api/compare_strategies', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol, start_date, end_date })
                });

                const data = await response.json();

                if (data.success) {
                    let tableHTML = `
                        <h3>策略对比结果</h3>
                        <table class="comparison-table">
                            <thead>
                                <tr>
                                    <th>策略</th>
                                    <th>总收益率</th>
                                    <th>夏普比率</th>
                                    <th>胜率</th>
                                    <th>最大回撤</th>
                                    <th>交易次数</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    data.comparison.forEach(item => {
                        tableHTML += `
                            <tr>
                                <td><strong>${item.strategy}</strong></td>
                                <td style="color: ${item.total_return_pct > 0 ? '#10b981' : '#ef4444'}">
                                    ${item.total_return_pct.toFixed(2)}%
                                </td>
                                <td>${item.sharpe_ratio.toFixed(2)}</td>
                                <td>${item.win_rate_pct.toFixed(2)}%</td>
                                <td style="color: #ef4444">${item.max_drawdown_pct.toFixed(2)}%</td>
                                <td>${item.total_trades}</td>
                            </tr>
                        `;
                    });

                    tableHTML += '</tbody></table>';

                    if (data.chart) {
                        tableHTML += `
                            <div class="chart-container">
                                <h3>对比图表</h3>
                                <img src="/api/reports/${data.chart}" alt="策略对比">
                            </div>
                        `;
                    }

                    resultsDiv.innerHTML = tableHTML;
                } else {
                    resultsDiv.innerHTML = `<div class="error">对比失败: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">请求失败: ${error.message}</div>`;
            }
        });

        // 加载信号统计
        async function loadSignalStats() {
            const days = document.getElementById('signal_days').value;
            const resultsDiv = document.getElementById('signalResults');

            resultsDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>正在加载...</p></div>';

            try {
                const response = await fetch(`/api/signal_statistics?days=${days}`);
                const data = await response.json();

                if (data.success) {
                    const stats = data.statistics;
                    resultsDiv.innerHTML = `
                        <h3>最近 ${days} 天信号统计</h3>
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <h3>总信号数</h3>
                                <div class="value">${stats.total_signals}</div>
                            </div>
                            <div class="metric-card">
                                <h3>买入信号</h3>
                                <div class="value positive">${stats.buy_signals}</div>
                            </div>
                            <div class="metric-card">
                                <h3>卖出信号</h3>
                                <div class="value negative">${stats.sell_signals}</div>
                            </div>
                            <div class="metric-card">
                                <h3>UP1 信号</h3>
                                <div class="value">${stats.up1_signals}</div>
                            </div>
                            <div class="metric-card">
                                <h3>UP2 信号</h3>
                                <div class="value">${stats.up2_signals}</div>
                            </div>
                            <div class="metric-card">
                                <h3>UP3 信号</h3>
                                <div class="value">${stats.up3_signals}</div>
                            </div>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `<div class="error">加载失败</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">请求失败: ${error.message}</div>`;
            }
        }

        // 加载策略列表
        async function loadStrategies() {
            const listDiv = document.getElementById('strategyList');
            listDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>正在加载...</p></div>';

            try {
                const response = await fetch('/api/strategies');
                const data = await response.json();

                if (data.success) {
                    let html = '';
                    data.strategies.forEach(strategy => {
                        const riskBadge = strategy.risk_level === 'low' ? 'badge-low' :
                                        strategy.risk_level === 'high' ? 'badge-high' : 'badge-medium';

                        html += `
                            <div class="strategy-card">
                                <h3>${strategy.name}</h3>
                                <p>${strategy.description}</p>
                                <div>
                                    <span class="badge ${riskBadge}">${strategy.risk_level}</span>
                                    ${strategy.custom ? '<span class="badge badge-medium">自定义</span>' : ''}
                                </div>
                                ${strategy.expected_return ? `<p>预期收益: ${strategy.expected_return}</p>` : ''}
                                ${strategy.holding_period ? `<p>持仓周期: ${strategy.holding_period}</p>` : ''}
                            </div>
                        `;
                    });
                    listDiv.innerHTML = html;
                } else {
                    listDiv.innerHTML = '<div class="error">加载失败</div>';
                }
            } catch (error) {
                listDiv.innerHTML = `<div class="error">请求失败: ${error.message}</div>`;
            }
        }

        function showCreateStrategy() {
            document.getElementById('createStrategyForm').style.display = 'block';
        }

        function hideCreateStrategy() {
            document.getElementById('createStrategyForm').style.display = 'none';
        }

        async function createStrategy() {
            const name = document.getElementById('strategy_name').value;
            const description = document.getElementById('strategy_desc').value;

            const conditions = {
                buy: document.getElementById('cond_buy').checked,
                up1: document.getElementById('cond_up1').checked,
                up2: document.getElementById('cond_up2').checked,
                up3: document.getElementById('cond_up3').checked
            };

            try {
                const response = await fetch('/api/strategy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description, conditions })
                });

                const data = await response.json();

                if (data.success) {
                    alert('策略创建成功！');
                    hideCreateStrategy();
                    loadStrategies();
                } else {
                    alert('创建失败: ' + data.error);
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            }
        }

        // 页面加载时初始化
        window.onload = () => {
            setDefaultDates();
            loadStrategies();
        };
    </script>
</body>
</html>
